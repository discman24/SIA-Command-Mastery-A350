{id:"PF08",ph:"preflight",ct:"cabin",sv:"caution",t:"Cabin Crew Sick — Minimum Crew at Risk",d:"One cabin crew reports unwell. Minimum crew complement threatened.",pr:"Assess fitness (Commander's decision). Check minimum crew for zone config. Request standby crew. If below minimum: cannot depart until replacement.",m:[],cb:["PDM","LTW","WLM","COM","PDI"],rs:"Safety-first fitness assessment. Verify regulatory minimum. Proactive standby request.",rf:"SIA OM Minimum Cabin Crew"},
{id:"PF09",ph:"preflight",ct:"operational",sv:"advisory",t:"Late Connecting Passengers — Slot Pressure",d:"10 connecting passengers delayed. Gate requests 15-min hold. Slot time tight.",pr:"Assess CTOT situation. Compute latest departure time. Weigh commercial vs slot loss. PA to onboard passengers within 10min of delay.",m:[],cb:["PDM","COM","WLM","LTW"],rs:"Balanced decision. Clear time limit. Regular PA updates.",rf:"SIA OM Departure / Delay Management"},
{id:"PF10",ph:"preflight",ct:"security",sv:"warning",t:"Unattended Bag in Cabin",d:"Cabin crew discovers unattended bag in overhead bin — owner unidentified.",pr:"Alert CIC. PA for owner. If unclaimed 2min: security threat. Inform ATC/airport security. Consider deplaning for sweep.",m:[],cb:["PDM","COM","LTW","SAW","PDI"],rs:"Follow security protocol strictly. Do not handle suspicious item. Coordinate security.",rf:"SIA OM Security"},
{id:"PF11",ph:"preflight",ct:"passenger",sv:"caution",t:"Intoxicated Passenger — Boarding Dispute",d:"Visibly intoxicated passenger becoming loud/aggressive at gate. Has boarded.",pr:"Commander can deny boarding/offload. Assess condition. If disruptive: offload with CIC. Written statements from 2 witnesses. Coordinate police if needed.",m:[],cb:["PDM","LTW","COM","PDI","SAW"],rs:"Firm decision. Proper documentation with witnesses. Professional handling.",rf:"SIA OM Unruly Passengers"},
{id:"PF12",ph:"preflight",ct:"passenger",sv:"caution",t:"Special Needs Passenger — Missing Oxygen",d:"Wheelchair passenger with oxygen requirement boarded but supplemental oxygen not loaded.",pr:"Verify aircraft medical oxygen sufficiency. If insufficient: urgently load prescribed oxygen. Cannot depart without. If unavailable: offload with care. Verify MEDIF documentation.",m:[],cb:["PDM","COM","LTW","KNO","PDI"],rs:"Patient safety first. All MEDIF requirements verified before departure.",rf:"SIA OM Special Passengers / MEDIF"},
{id:"PF13",ph:"preflight",ct:"technical",sv:"caution",t:"Dual EFB Failure",d:"Both EFBs showing software errors. No electronic charts or performance data.",pr:"Restart both. If one recovers: dispatch per MEL. If both failed: paper charts required. Performance via alternate means. If no backup: cannot dispatch.",m:[],cb:["KNO","APC","PDM","WLM"],rs:"Systematic troubleshooting. MEL assessment. Alternative information sources confirmed.",rf:"FCTM EFB / SIA OM MEL"},
{id:"PF14",ph:"preflight",ct:"medical",sv:"warning",t:"Passenger Medical Emergency Before Pushback",d:"CIC reports chest pains in 32A. Pulse rapid, irregular. Doctor paged.",pr:"Gate medical resources superior to inflight. Request airport medical team. Doctor assesses. If advised: offload for hospital. Do NOT depart with active medical emergency.",m:[],cb:["PDM","COM","LTW","SAW","PDI"],rs:"Gate treatment prioritized. Clear decision: treat on ground rather than risk deterioration.",rf:"SIA OM Medical / Commander's Discretion"},

// BEFORE START
{id:"BS01",ph:"before_start",ct:"operational",sv:"caution",t:"Loadsheet: Weight Exceeds MTOW",d:"Final loadsheet shows 800kg above MTOW.",pr:"Verify accuracy. Options: 1) Offload cargo 2) Reduce fuel to minimum 3) Offload passengers (last resort). Recompute performance.",m:[],cb:["KNO","APC","PDM","COM","WLM"],rs:"Systematic weight reduction. Never exceed structural limits.",rf:"SQNP Before Start / FCOM Performance"},
{id:"BS02",ph:"before_start",ct:"passenger",sv:"advisory",t:"Passenger Count Mismatch",d:"Cabin crew headcount 2 fewer than manifest. Cannot identify who is missing.",pr:"Recount. Check lavatories. Gate agent verifies boarding records. If unaccounted: offload their checked bags (MANDATORY security). Delay code PQ.",m:[],cb:["SAW","COM","LTW","PDM","PDI"],rs:"Security compliance non-negotiable. Unaccounted passenger bags MUST be offloaded.",rf:"SIA OM Passenger Reconciliation / ICAO Annex 17"},
{id:"BS03",ph:"before_start",ct:"operational",sv:"caution",t:"ATC Slot Delay — CTOT 45 Minutes",d:"ATC flow control delay. CTOT 45 minutes after scheduled departure.",pr:"Accept CTOT. PA using NITS format. Keep cabin crew informed. SIAOCC via ACARS. Monitor for earlier slot (respond within 10 min).",m:[],cb:["COM","WLM","LTW","PDM"],rs:"Professional delay management. Regular PAs every 15-20 min. Monitor earlier slot.",rf:"SIA OM Flow Control / SQNP ATC Delays"},
{id:"BS04",ph:"before_start",ct:"passenger",sv:"advisory",t:"Passenger Refuses to Stow Oversized Bag",d:"Passenger insists oversized carry-on stays with them. Bin won't close.",pr:"CIC handles first. If refuses: Commander informed. Commander's word final per ANO. Two options: gate-check or deplane.",m:[],cb:["LTW","COM","PDM","PDI"],rs:"Calm, firm safety regulations. Options offered. Offload if non-compliant.",rf:"SIA OM Commander's Authority"},

// ENGINE START
{id:"ES01",ph:"engine_start",ct:"technical",sv:"warning",t:"Engine Hot Start — EGT Exceeding",d:"Engine 2 auto-start EGT rising rapidly toward limit.",pr:"MASTER LEVER → OFF immediately. Wait for cooling per FCOM. Max re-attempts per limits. If second attempt abnormal: return to gate.",m:["MASTER LEVER → OFF if EGT exceeding"],cb:["KNO","APC","SAW","PDM"],rs:"Prompt recognition and abort. Patient cooling. Conservative re-attempt limit.",rf:"FCOM Engine Start / FCTM"},
{id:"ES02",ph:"engine_start",ct:"technical",sv:"emergency",t:"Engine Fire During Start",d:"ECAM ENG 1 FIRE during start sequence.",pr:"ENG 1 MASTER → OFF. FIRE pb → PUSH. If persists 30s: AGENT 1 DISCH. If still: AGENT 2. Park brake ON. Notify ATC. Alert cabin. Consider evacuation.",m:["ENG MASTER → OFF","FIRE pb → PUSH","AGENT 1 after 30s","AGENT 2 if persists"],cb:["APC","PDM","COM","LTW","WLM","PDI"],rs:"Immediate memory items. Calm communication. Evacuation if uncontrollable.",rf:"ECAM ENG FIRE / FCTM Fire"},
{id:"ES03",ph:"engine_start",ct:"operational",sv:"caution",t:"Ground Crew Disconnect Failure",d:"After start, ground interphone still connected. Ground crew not responding.",pr:"Do not taxi with equipment attached. Attempt interphone. If no response: parking brake, inform ATC. Request investigation. Never drag equipment.",m:[],cb:["SAW","COM","PDM","PDI"],rs:"Patient handling. Safety over schedule. Positive ground-clear confirmation.",rf:"SQNP Engine Start"},

// AFTER START
{id:"AS01",ph:"after_start",ct:"technical",sv:"caution",t:"Flight Control Check — Restricted Travel",d:"Restricted elevator travel on right side during full check.",pr:"DO NOT TAXI. Report maintenance. Return to gate. Never depart with flight control restriction.",m:[],cb:["KNO","APC","PDM","SAW","PDI"],rs:"Zero tolerance for flight control anomalies. Immediate return.",rf:"FCTM Flight Controls Check"},
{id:"AS02",ph:"after_start",ct:"cabin",sv:"advisory",t:"Slide Arming Discrepancy",d:"DOOR SD shows one slide not armed. CIC says all armed.",pr:"Cross-check DOOR SD vs cabin confirmation. If discrepancy: investigate. Cannot depart with exit unserviceable unless MEL allows with pax reduction.",m:[],cb:["SAW","APC","COM","PDM"],rs:"Resolve before taxi. Every emergency exit verified functional.",rf:"SQNP Door Verification / FCOM"},

// TAXI OUT
{id:"TX01",ph:"taxi_out",ct:"technical",sv:"warning",t:"Brake Check Failure — Asymmetric",d:"Left side significantly weaker than right. Aircraft pulls right under braking.",pr:"STOP. Parking brake. Check ECAM WHEEL page. If degraded: return to gate. DO NOT takeoff with asymmetric braking.",m:[],cb:["APC","SAW","PDM","FPM","PDI"],rs:"Immediate stop. Conservative return. Maintenance investigation mandatory.",rf:"FCTM Taxi / SQNP Brake Check"},
{id:"TX02",ph:"taxi_out",ct:"security",sv:"emergency",t:"Runway Incursion — Vehicle on Runway",d:"Vehicle crossing active runway while you hold short. ATC hasn't called traffic.",pr:"DO NOT enter runway. Alert ATC: 'HOLDING SHORT, VEHICLE ON RUNWAY'. Verify position. Don't accept takeoff clearance until confirmed clear.",m:[],cb:["SAW","COM","PDM","PDI"],rs:"See-and-avoid. Proactive ATC alert. Verify visually.",rf:"SIA OM Runway Safety / FCTM Taxi"},
{id:"TX03",ph:"taxi_out",ct:"medical",sv:"caution",t:"Passenger Seizure During Taxi",d:"CIC: passenger 15C having seizure. Doctor assisting. Asking if return to gate.",pr:"Assess medical situation. Doctor's recommendation is key input. If stable and doctor advises continue: proceed with monitoring. If hospital needed: return to gate. Declare PAN PAN if returning.",m:[],cb:["PDM","COM","LTW","SAW","WLM"],rs:"Doctor's advice as key input. Commander's final decision. Gate resources superior if in doubt.",rf:"SIA OM Medical / Commander's Discretion"},
{id:"TX04",ph:"taxi_out",ct:"passenger",sv:"advisory",t:"Passenger Demands to Deplane During Taxi",d:"Passenger 8A extremely anxious, claiming must get off. Doors closed, taxiing.",pr:"Cannot open doors during taxi. CIC calms and assesses. If genuine medical emergency: stop, return to gate. If anxiety: CIC provides support. If attempting to open door: security issue.",m:[],cb:["PDM","COM","LTW","SAW","PDI"],rs:"Patient assessment. Distinguish medical from anxiety. Safety of all considered.",rf:"SIA OM Passenger Management"},
{id:"TX05",ph:"taxi_out",ct:"atc",sv:"advisory",t:"Amended Clearance — Different SID During Taxi",d:"ATC issues new SID requiring FMS reprogramming while taxiing.",pr:"Read back. PM reprograms while PF taxis. Verify new SID. Brief differences. If insufficient time: request hold position.",m:[],cb:["APC","COM","SAW","WLM","KNO"],rs:"Accurate readback. Efficient FMS update with verification. Request time if needed.",rf:"SQNP Taxi / FCTM Departure"},
{id:"TX06",ph:"taxi_out",ct:"technical",sv:"warning",t:"CONFIG Warning During Taxi",d:"ECAM CONFIG warning — possible flap/trim misconfiguration.",pr:"Slow/stop taxi. Verify config: flaps per loadsheet, trim set, spoilers armed RTO. Cross-check ECAM memo. Correct before runway.",m:[],cb:["SAW","APC","KNO","PDM"],rs:"Never ignore CONFIG warnings. Resolve before runway.",rf:"SQNP Pre-Takeoff / FCOM CONFIG"},
{id:"TX07",ph:"taxi_out",ct:"cabin",sv:"advisory",t:"Cabin Not Ready — Approaching Runway",d:"Approaching runway, no CABIN READY signal. CIC: galley equipment still unsecured.",pr:"Do NOT enter runway without CABIN READY. Hold short. Inform ATC: 'Need 2 minutes.' Wait for confirmation.",m:[],cb:["APC","COM","SAW","LTW","PDI"],rs:"Never take off without cabin ready. Short hold acceptable.",rf:"SQNP Taxi / SIA OM Cabin Ready"},
{id:"TX08",ph:"taxi_out",ct:"passenger",sv:"caution",t:"Unruly Passenger Becomes Aggressive",d:"Passenger 22D verbally abusing cabin crew after seatbelt request. Escalating.",pr:"CIC de-escalation. If physically threatening: Commander decides return to gate. Restrain with witness documentation. Alert police via ATC.",m:[],cb:["LTW","PDM","COM","PDI","SAW"],rs:"De-escalation first. Firm boundary if safety threatened. Return with police. Documentation.",rf:"SIA OM Unruly Passengers"},

// TAKEOFF
{id:"TO01",ph:"takeoff",ct:"technical",sv:"emergency",t:"RTO — Engine Failure Below V1",d:"At 135kt, ECAM ENG 2 FAIL. Below V1.",pr:"'STOP'. THRUST IDLE. REVERSE MAX. PM: 'REVERSERS','DECELERATION', AUTOBRAKE, ATC. If insufficient: FULL PEDAL. PARK BRAKE when stopped. Alert cabin. ECAM.",m:["'STOP'","THRUST → IDLE","REVERSE → MAX","PARK BRAKE ON"],cb:["APC","PDM","FPM","COM","LTW","SAW","WLM","PDI"],rs:"Timely reject. Correct braking. Calm coordination.",rf:"FCTM RTO / SQNP Callouts"},
{id:"TO02",ph:"takeoff",ct:"technical",sv:"emergency",t:"Engine Failure After V1",d:"Engine 1 fails past V1. Yaw, ECAM warnings.",pr:"CONTINUE. Stabilize pitch/speed. Rudder to center blue beta target. Trim to relieve. Follow SRS. At EO accel alt: ALT pb. ECAM when safe.",m:["Continue","Rudder → center beta","Trim","ECAM when safe"],cb:["FPM","APC","SAW","PDM","COM","WLM","PDI"],rs:"Fly first. Correct asymmetric handling. Patient ECAM.",rf:"FCTM Engine Failure After V1"},
{id:"TO03",ph:"takeoff",ct:"weather",sv:"emergency",t:"Windshear on Takeoff",d:"'GO AROUND WINDSHEAR AHEAD' during rotation.",pr:"'WINDSHEAR TOGA'. TOGA. No config change. Full backstick if needed for SRS. Fly out completely.",m:["'WINDSHEAR TOGA'","TOGA","No config change","Full backstick"],cb:["FPM","APC","SAW","PDM","COM","PDI"],rs:"Immediate correct response. No premature reconfiguration.",rf:"FCTM Windshear"},
{id:"TO04",ph:"takeoff",ct:"technical",sv:"warning",t:"Tire Failure During Takeoff Roll",d:"Loud bang, vibration at 100kt. Possible tire failure.",pr:"Below V1: assess directional control. Above V1: CONTINUE. After airborne: DO NOT retract gear. ECAM. Compute degraded landing performance.",m:[],cb:["PDM","FPM","SAW","APC","COM","WLM"],rs:"Correct speed-based decision. Conservative gear decision. Performance recomputation.",rf:"FCTM Wheel Tire Damage"},
{id:"TO05",ph:"takeoff",ct:"technical",sv:"emergency",t:"Stall Warning at Liftoff",d:"Stick shaker during rotation. AOA high.",pr:"'STALL, TOGA 12.5°'. TOGA. Pitch 12.5°. Don't over-rotate. Verify config.",m:["'STALL, TOGA 12.5°'","TOGA","Pitch 12.5°"],cb:["FPM","APC","SAW","PDM","PDI"],rs:"Immediate stall recovery. Correct thrust/pitch. Configuration check.",rf:"SQNP Stall / FCTM Stall Recovery"},
{id:"TO06",ph:"takeoff",ct:"atc",sv:"warning",t:"TCAS RA During Initial Climb-out",d:"Immediately after gear up, TCAS RA CLIMB. Conflict traffic.",pr:"ABSOLUTE PRIORITY. 'TCAS BLUE'/'TCAS, I HAVE CONTROL'. Follow RA immediately. Do NOT follow contrary ATC. Inform ATC.",m:["Follow RA IMMEDIATELY","Absolute priority"],cb:["FPM","APC","SAW","COM","PDM","PDI"],rs:"Instant compliance. Override contrary ATC. Report.",rf:"FCTM TCAS RA / SQSP"},
{id:"TO07",ph:"takeoff",ct:"technical",sv:"warning",t:"Bird Strike at V1/Rotation",d:"Multiple impacts at rotation. Thuds. Engine parameters initially normal.",pr:"Continue (past V1). Monitor engines closely. If abnormal: engine failure procedures. If windshield cracked: pressurization implications. Report to ATC.",m:[],cb:["SAW","PDM","FPM","COM","APC"],rs:"Continue safely. Thorough monitoring. Early report.",rf:"FCTM Bird Strike"},
{id:"TO08",ph:"takeoff",ct:"technical",sv:"emergency",t:"Dual Engine Failure — All Engines",d:"Both engines lose thrust during climb (bird flock / contamination).",pr:"Windmill relight attempt. If altitude insufficient: forced landing. MAYDAY. Best available area. APU for backup.",m:["Windmill relight","MAYDAY","Best landing area","APU"],cb:["FPM","PDM","SAW","COM","APC","LTW","WLM","PDI"],rs:"Immediate relight. Best energy management. MAYDAY. Crew coordination.",rf:"FCTM All Engines Failure"},

// INITIAL CLIMB
{id:"IC01",ph:"initial_climb",ct:"technical",sv:"emergency",t:"Engine Fire in Climb",d:"ECAM ENG 2 FIRE at 1500ft AGL. Master warning, fire bell.",pr:"ECAM: ENG 2 MASTER → OFF, FIRE pb → PUSH, AGENT 1 after 30s. If not extinguished: AGENT 2. Continue climb. Declare PAN/MAYDAY. Return.",m:["ENG MASTER → OFF","FIRE pb → PUSH","AGENT 1 → 30s","AGENT 2"],cb:["APC","PDM","FPM","COM","SAW","WLM","LTW"],rs:"Immediate ECAM. Single engine climb management. Return planning.",rf:"ECAM ENG FIRE / FCTM Fire"},
{id:"IC02",ph:"initial_climb",ct:"technical",sv:"warning",t:"ECAM Warning Below 400ft — Delay Actions",d:"Multiple ECAM cautions at 300ft AGL. HYD + ELEC.",pr:"SAFE FLIGHT PATH FIRST. Delay READ & DO until ≥400ft AGL. PF flies. PM monitors and notes. Actions only when safe.",m:["Safe flight path FIRST","Delay until ≥400ft AGL"],cb:["APC","SAW","WLM","PDM","FPA","FPM"],rs:"Absolute discipline: Fly, Navigate, Communicate. ECAM waits.",rf:"FCTM ECAM Philosophy / 400ft Rule"},
{id:"IC03",ph:"initial_climb",ct:"medical",sv:"caution",t:"Passenger Collapse After Takeoff",d:"Passenger 41K collapsed. Cabin crew first aid. Doctor paged.",pr:"CONTINUE CLIMB — cannot return at low altitude. CIC manages with medical resources. Page doctor. At safe altitude: assess return vs continue.",m:[],cb:["PDM","COM","LTW","SAW","WLM"],rs:"Continue to safe altitude. Medical assessment. Rational return decision.",rf:"SIA OM Medical / Return Decision"},
{id:"IC04",ph:"initial_climb",ct:"cabin",sv:"warning",t:"Lavatory Smoke Detection",d:"ECAM SMOKE LAVATORY at 2000ft during climb.",pr:"CIC investigates with PBE and extinguisher. If source found: extinguish/isolate. If not: full FIRE SMOKE FUMES procedure. Consider return.",m:[],cb:["APC","SAW","PDM","COM","LTW","WLM"],rs:"Rapid investigation. Clear identification or escalation.",rf:"FCTM Lavatory Smoke / ECAM"},
{id:"IC05",ph:"initial_climb",ct:"technical",sv:"emergency",t:"Unreliable Airspeed During Climb",d:"Captain/FO airspeeds diverging. ECAM ADR DISAGREE.",pr:"'UNRELIABLE SPEED'. Safe flight path FIRST. Memory items: pitch/thrust for climb. IMMEDIATELY to QRH NAV UNRELIABLE. Don't stay on memory values long.",m:["'UNRELIABLE SPEED'","Pitch/thrust memory values","QRH immediately"],cb:["SAW","APC","FPM","PDM","KNO","COM"],rs:"Recognition, stabilization, rapid transition to troubleshooting.",rf:"FCTM Unreliable Airspeed / QRH"},

// CLIMB
{id:"CL01",ph:"climb",ct:"technical",sv:"emergency",t:"Cabin Pressurization Failure — Emergency Descent",d:"CAB PRESS EXCESS CAB ALT. Cabin altitude climbing through 10,000ft.",pr:"'EMERGENCY DESCENT'. Memory: CREW OXY → USE, SIGNS → ON, EMER DESC → INITIATE, SPD BRK → FULL, THR → IDLE. ATC, squawk 7700. PA to cabin.",m:["CREW OXY → USE","SIGNS → ON","EMER DESC → INITIATE","SPD BRK → FULL","THR → IDLE"],cb:["APC","PDM","FPA","COM","SAW","WLM","LTW","PDI"],rs:"Immediate memory items. Terrain awareness. ATC coordination.",rf:"FCTM Emergency Descent"},
{id:"CL02",ph:"climb",ct:"technical",sv:"emergency",t:"Smoke / Fumes in Cockpit",d:"Acrid electrical smell. Thin haze visible in cockpit.",pr:"Crew oxygen/PBE. Identify source if possible. If not: FIRE SMOKE FUMES — electrical isolation. Plan IMMEDIATE diversion. LAND ASAP if uncontrollable.",m:["Oxygen/PBE ON","Identify or isolate source","LAND ASAP if uncontrolled"],cb:["APC","PDM","COM","SAW","WLM","LTW","PDI"],rs:"Don protective equipment. Systematic identification. Early diversion decision.",rf:"FCTM FIRE SMOKE FUMES / SQSP"},
{id:"CL03",ph:"climb",ct:"medical",sv:"warning",t:"Passenger Cardiac Arrest",d:"Doctor reports cardiac arrest. CPR in galley. AED deployed.",pr:"Life-threatening. Assess: destination vs diversion time. Tele-medical via SATCOM. If diversion faster with hospital: DIVERT. PAN PAN MEDICAL PRIORITY.",m:[],cb:["PDM","COM","LTW","SAW","WLM","PDI"],rs:"Time-critical decision. Tele-medical. Fastest hospital access.",rf:"SIA OM Medical / Tele-Medical"},
{id:"CL04",ph:"climb",ct:"passenger",sv:"caution",t:"Suspected Infectious Disease",d:"CIC: passenger with high fever, cough, vomiting. Recent outbreak area travel.",pr:"ISOLATE immediately. Protective equipment. Tele-medical consultation. Do NOT divert solely for infection unless deteriorating. Notify arrival station. SIAOCC.",m:[],cb:["PDM","COM","LTW","SAW","KNO"],rs:"Isolation first. Medical consultation. Authorities notified. Balanced diversion decision.",rf:"SIA OM Infectious Disease"},
{id:"CL05",ph:"climb",ct:"technical",sv:"caution",t:"Fuel Quantity Discrepancy",d:"Fuel flow higher than planned. 400kg less than expected.",pr:"Cross-check fuel flow both engines. Verify no leak (ECAM FUEL). Compute sufficiency. If tight: alternate routing, lower altitude, or fuel stop. Update SIAOCC.",m:[],cb:["SAW","KNO","PDM","COM","WLM"],rs:"Early detection. Systematic crosscheck. Proactive management.",rf:"FCTM Fuel / SIA OM Fuel Policy"},

// CRUISE
{id:"CR01",ph:"cruise",ct:"technical",sv:"warning",t:"Single Engine Shutdown in Cruise",d:"ECAM ENG 1 failure/high vibration requiring shutdown.",pr:"Follow ECAM. Drift-down. Recompute fuel/diversion. ETOPS/EROPS assessment. ATC. Coordinate dispatch.",m:[],cb:["APC","PDM","SAW","KNO","COM","WLM","FPA"],rs:"Orderly ECAM. Drift-down. Informed diversion decision.",rf:"FCTM Engine Failure Cruise"},
{id:"CR02",ph:"cruise",ct:"weather",sv:"warning",t:"Severe Turbulence — Cabin Injuries",d:"Unexpected severe turbulence. Multiple cabin injuries. Galley scattered.",pr:"MISC SEVERE TURBULENCE. Speed: Green Dot to 300kt/M.85. AP ON. Recycle SEATBELT rapidly. PA: 'BE SEATED IMMEDIATELY'. Assess injuries. Consider diversion.",m:["Recycle SEATBELT urgently","Speed: GD to 300/M.85","AP ON"],cb:["FPA","SAW","PDM","COM","APC","WLM","LTW"],rs:"Aircraft control. Cabin protection. Injury assessment. Diversion if serious.",rf:"FCTM Severe Turbulence / SQSP"},
{id:"CR03",ph:"cruise",ct:"medical",sv:"warning",t:"Passenger Death Suspected",d:"Doctor pronounces passenger dead. CIC requesting guidance.",pr:"Leave body in place. Type 2 body bag if available. Notify SIAOCC → Airport Police/Health Office. Commander: General Declaration entry. Continue to destination.",m:[],cb:["PDM","COM","LTW","PDI","WLM"],rs:"Dignified handling. Documentation. Notification chain. Flight continues.",rf:"SIA OM Death on Board"},
{id:"CR04",ph:"cruise",ct:"security",sv:"emergency",t:"Bomb Threat via ACARS",d:"SIAOCC relays bomb threat. No specific location.",pr:"SIA security procedures. Assess credibility with SIAOCC. If credible: divert to nearest with EOD. Do NOT shut down engines until directed. Isolation parking. Cabin search if directed.",m:[],cb:["PDM","COM","LTW","SAW","PDI","WLM"],rs:"Calm threat assessment. Coordinated response. No panic.",rf:"SIA OM Security / SQI Announcements"},
{id:"CR05",ph:"cruise",ct:"technical",sv:"emergency",t:"TCAS RA — Descend Now",d:"TCAS RA 'DESCEND DESCEND'. Opposite direction traffic.",pr:"ABSOLUTE PRIORITY. Follow vertical guidance. Do NOT obey contrary ATC. Inform ATC. Return to cleared altitude at 'CLEAR OF CONFLICT'.",m:["Follow RA IMMEDIATELY","No contrary ATC"],cb:["FPM","APC","SAW","COM","PDM","PDI"],rs:"Instant compliance. ATC overridden if necessary.",rf:"FCTM TCAS RA"},
{id:"CR06",ph:"cruise",ct:"technical",sv:"emergency",t:"Captain Incapacitation",d:"Captain slumps in seat, unresponsive.",pr:"'I have control'. Engage AP. If interference: sidestick pb 40s. Inform ATC. CIC to assist securing. Early approach prep. Request vectors. Consider auto landing.",m:["'I have control'","AP engaged","Sidestick pb 40s","Vectors/auto land"],cb:["LTW","PDM","COM","SAW","WLM","FPA","PDI"],rs:"Immediate control. Secure pilot. Workload reduction. Safe landing.",rf:"FCTM Crew Incapacitation"},
{id:"CR07",ph:"cruise",ct:"passenger",sv:"caution",t:"Passenger Physical Fight",d:"Two passengers in physical altercation. Other passengers distressed.",pr:"CIC separates. Restrain if needed per SIA procedures. Witness statements. Continue or divert based on ongoing threat. SIAOCC.",m:[],cb:["LTW","PDM","COM","PDI","SAW"],rs:"De-escalation. Restraint if needed. Balanced diversion assessment.",rf:"SIA OM Unruly Passengers"},
{id:"CR08",ph:"cruise",ct:"cabin",sv:"emergency",t:"Lithium Battery Fire in Cabin",d:"Passenger laptop smoking/flaming in seat pocket.",pr:"CIC: PBE + extinguisher. Pour water/liquid on device. Immerse in container. Monitor continuously. If spreading: FIRE SMOKE FUMES. Consider diversion.",m:["Extinguish","Immerse in liquid","Monitor"],cb:["APC","PDM","COM","SAW","LTW","WLM"],rs:"Rapid response. Correct immersion. Continuous monitoring.",rf:"FCTM Lithium Battery / QRH"},
{id:"CR09",ph:"cruise",ct:"weather",sv:"emergency",t:"Volcanic Ash Encounter",d:"Acrid smell, haze, St. Elmo's fire. Engine parameters changing.",pr:"180° descending turn EXIT. A/THR OFF, thrust IDLE. Anti-ice ON. All packs ON. APU start. Oxygen 100%. Monitor airspeed/EGT.",m:["180° turn exit","A/THR OFF, IDLE","Anti-ice/packs ON","APU","Oxygen 100%"],cb:["SAW","APC","PDM","FPM","KNO","COM"],rs:"Immediate exit. Engine protection. System monitoring.",rf:"FCTM Volcanic Ash / SIA OM"},
{id:"CR10",ph:"cruise",ct:"cabin",sv:"caution",t:"Two Cabin Crew Incapacitated — Food Poisoning",d:"Two crew members severe gastro. Minimum crew at risk.",pr:"Assess remaining complement vs minimum. If below: must land nearest suitable. Tele-medical for affected crew. SIAOCC for replacement at diversion.",m:[],cb:["PDM","LTW","COM","SAW","WLM","KNO"],rs:"Regulatory compliance. Diversion if below minimum crew.",rf:"SIA OM Minimum Cabin Crew"},

// DESCENT
{id:"DS01",ph:"descent",ct:"technical",sv:"emergency",t:"Emergency Descent Required",d:"Structural/pressurization loss requiring rapid descent.",pr:"'EMERGENCY DESCENT'. Memory items. Terrain awareness. TCAS priority even during descent. 10,000ft or MEA. High terrain: SQSP escape manoeuvre.",m:["CREW OXY → USE","SIGNS → ON","EMER DESC → INITIATE","SPD BRK → FULL"],cb:["APC","PDM","SAW","FPA","COM","WLM","LTW","PDI"],rs:"Immediate execution. Terrain awareness. TCAS compliance.",rf:"FCTM Emergency Descent / SQSP"},
{id:"DS02",ph:"descent",ct:"operational",sv:"caution",t:"Destination Below Minima — Divert?",d:"ATIS: destination below Cat I. Fuel for one approach + diversion.",pr:"Can weather improve? Fuel for holding? Alternate acceptable? Decision: attempt one approach with diversion fuel, or divert now.",m:[],cb:["KNO","PDM","SAW","COM","WLM"],rs:"Data-driven decision. Clear decision gates briefed.",rf:"SIA OM Weather / Fuel Policy"},
{id:"DS03",ph:"descent",ct:"medical",sv:"warning",t:"Medical Emergency — Diversion Assessment",d:"Doctor requests immediate landing for suspected stroke. 40min to dest, 25min to diversion.",pr:"PAN PAN MEDICAL PRIORITY. Tele-medical. Compute fuel/performance at diversion. If faster with hospital: DIVERT. SIAOCC for ground medical.",m:[],cb:["PDM","COM","LTW","SAW","WLM","KNO"],rs:"Time-critical decision. Fastest hospital access.",rf:"SIA OM Medical Diversion"},
{id:"DS04",ph:"descent",ct:"operational",sv:"caution",t:"Fuel Jettison Required",d:"Returning emergency but above MLW. Jettison needed.",pr:"No speed/config restrictions. ATC for height (6,000ft ICAO min). Not near thunderstorms. Avoid jettisoned flow (~500ft/min descent). Recompute landing performance.",m:[],cb:["APC","KNO","COM","SAW","WLM"],rs:"Correct technique. ATC coordination. Weight verified.",rf:"SQNP Fuel Jettison / FCTM"},

const RT=[{f:"SIN",t:"KUL",d:"1h00m",nm:"160nm",fl:"FL350"},{f:"SIN",t:"BKK",d:"2h20m",nm:"790nm",fl:"FL370"},{f:"SIN",t:"HKG",d:"3h40m",nm:"1590nm",fl:"FL390"},{f:"SIN",t:"NRT",d:"6h40m",nm:"2900nm",fl:"FL410"},{f:"SIN",t:"SYD",d:"7h50m",nm:"3400nm",fl:"FL390"},{f:"SIN",t:"LHR",d:"13h00m",nm:"5965nm",fl:"FL410"}];
const genRoute=()=>RT[Math.floor(Math.random()*RT.length)];

const genFlight=(diff)=>{
  const mx=diff==="extreme"?12:diff==="hard"?8:5;
  const pool=[...B].sort(()=>Math.random()-.5);const sel=[];let hasE=false;
  for(const s of pool){if(sel.length>=mx)break;if(sel.filter(x=>x.ph===s.ph).length>=2)continue;
    if(!hasE&&s.sv==="emergency"&&sel.length<mx-1){sel.push(s);hasE=true;continue}
    if(Math.random()>.4)sel.push(s);}
  if(!hasE){const e=pool.find(s=>s.sv==="emergency"&&!sel.includes(s));if(e){sel.pop();sel.push(e);}}
  const po=P.map(p=>p.id);sel.sort((a,b)=>po.indexOf(a.ph)-po.indexOf(b.ph));
  return{scenarios:sel.slice(0,mx),route:genRoute()};
};

  const WK=[{w:1,t:"Foundation & Ground Ops",p:["preflight","before_start"]},{w:2,t:"Engine Start & Config",p:["engine_start","after_start"]},{w:3,t:"Taxi & Pre-Takeoff",p:["taxi_out"]},{w:4,t:"Takeoff Critical I",p:["takeoff"]},{w:5,t:"Takeoff Critical II",p:["takeoff","initial_climb"]},{w:6,t:"Initial Climb & Climb",p:["initial_climb","climb"]},{w:7,t:"Climb & Cruise I",p:["climb","cruise"]},{w:8,t:"Cruise Operations",p:["cruise"]},{w:9,t:"Cruise & Descent",p:["cruise","descent"]},{w:10,t:"Approach",p:["approach"]},{w:11,t:"Landing",p:["landing","after_landing"]},{w:12,t:"Integration & Command",p:["after_landing"]}];
  const Program=()=>h("div",{style:{padding:16}},
    h("div",{style:{color:"#e2e8f0",fontSize:14,fontWeight:700,marginBottom:4}},"12-Week Command Training"),
    h("p",{style:{color:"#94a3b8",fontSize:11,marginBottom:14}},"Calibrated for 19yrs experience, 10yrs A350-900."),
    h("div",{style:{display:"grid",gap:8}},WK.map(w=>{
      const sc=B.filter(s=>w.p.includes(s.ph));const d=sc.filter(s=>done[s.id]).length;
      return h("div",{key:w.w,style:{background:"#111827",borderRadius:10,padding:14,border:"1px solid #1e293b"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
          h("div",{style:{display:"flex",alignItems:"center",gap:6}},h("span",{style:{background:d===sc.length&&sc.length?"#166534":"#1e293b",color:d===sc.length&&sc.length?"#4ade80":"#94a3b8",padding:"2px 7px",borderRadius:4,fontSize:10,fontWeight:800}},"W"+w.w),h("span",{style:{color:"#e2e8f0",fontSize:12,fontWeight:700}},w.t)),
          h("span",{style:{color:"#64748b",fontSize:10}},d+"/"+sc.length)),
        h(Bar,{v:sc.length?(d/sc.length)*100:0,c:d===sc.length&&sc.length?"#22c55e":"#3b82f6"}))})));

  // ─── RENDER ─────────────────────────────────────────────────────
  return h("div",{className:"safe-bottom",style:{minHeight:"100vh",minHeight:"100dvh",background:"#0a0f1e"}},
    Header(),
    h("div",{style:{maxWidth:1000,margin:"0 auto",paddingBottom:32}},
      view==="dashboard"?Dashboard():null,
      view==="bank"?Bank():null,
      view==="detail"?Detail():null,
      view==="sim"?Sim():null,
      view==="phases"?Phases():null,
      view==="program"?Program():null))
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
